name: vet OSS Components

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  # Required for actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
  contents: read

  # Required for writing pull request comment
  issues: write
  pull-requests: write

  # Required for uploading findings to Github security tab
  security-events: write

jobs:
  vet:
    name: vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Run vet
        id: vet
        uses: safedep/vet-action@v1
        with:
          # Path to the policy file.
          # Remove following line to use the default policy
          policy: .github/vet/policy.yml
        env:
          # Required for writing pull request comment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Remove the comments from below upload action if Code Scanning is available
      # for your Github subscription
