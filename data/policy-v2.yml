version: POLICY_VERSION_V2
type: POLICY_TYPE_DENY
target: POLICY_TARGET_VET
name: General Purpose OSS Best Practices
labels:
  - general
  - safedep-managed
rules:
  - name: critical-or-high-vulns
    description: Critical or high risk vulnerabilities were found
    check: RULE_CHECK_VULNERABILITY
    value: |
      pkg.vulnerabilities.exists(vuln, vuln.severity in ['CRITICAL', 'HIGH'])

  - name: low-popularity-component
    description: Component popularity is low by Github stars count
    check: RULE_CHECK_POPULARITY
    value: |
      pkg.projects.exists(p, p.project.type == ProjectSourceType.GITHUB && p.stars < 10)

  - name: risky-oss-licenses
    description: Risky OSS license was detected
    check: RULE_CHECK_LICENSE
    value: |
      pkg.licenses.exists(l, l.license_id in ['GPL-2.0', 'GPL-2.0-only', 'GPL-3.0', 'GPL-3.0-only', 'BSD-3-Clause OR GPL-2.0'])

  - name: unmaintained-component
    description: Component appears to be unmaintained
    check: RULE_CHECK_MAINTENANCE
    value: |
      pkg.projects.exists(p, p.scorecard.checks.exists(c, c.name == "Maintained" && c.score == 0))

  - name: malicious-component
    description: Malicious (malware) component detected
    check: RULE_CHECK_MALWARE
    value: |
      pkg.vulnerabilities.exists(v, v.id.startsWith("MAL-"))

  - name: dangerous-workflow
    description: Component release pipeline appear to use dangerous workflows
    check: RULE_CHECK_PROJECT_SCORECARD
    value: |
      pkg.projects.exists(p, p.scorecard.checks.exists(c, c.name == "Dangerous-Workflow" && c.score == 0))
